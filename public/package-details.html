    <style>
        /* ── ITINERARY TIMELINE ── */
.timeline {
  position: relative;
  padding-left: 8px;
  margin-top: 12px;
}

.timeline::before {
  content: '';
  position: absolute;
  top: 6px;
  bottom: 6px;
  left: 23px;
  width: 2px;
  background: linear-gradient(to bottom, var(--saffron) 0%, var(--line) 0%);
  transition: background 1.2s ease;
}

.timeline.in::before {
  background: linear-gradient(to bottom, var(--saffron) 100%, var(--line) 100%);
}

.timeline-item {
  position: relative;
  display: flex;
  gap: 22px;
  padding-bottom: 32px;
  opacity: 0;
  transform: translateX(-16px);
  transition: opacity .5s ease, transform .5s cubic-bezier(.2,.8,.2,1);
}

.timeline-item.in {
  opacity: 1;
  transform: translateX(0);
}

.timeline-item:last-child {
  padding-bottom: 0;
}

.timeline-item:nth-child(1) { transition-delay: 0s; }
.timeline-item:nth-child(2) { transition-delay: .12s; }
.timeline-item:nth-child(3) { transition-delay: .24s; }
.timeline-item:nth-child(4) { transition-delay: .36s; }
.timeline-item:nth-child(5) { transition-delay: .48s; }
.timeline-item:nth-child(6) { transition-delay: .6s; }
.timeline-item:nth-child(n+7) { transition-delay: .7s; }

.timeline-marker {
  position: relative;
  z-index: 2;
  flex-shrink: 0;
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: var(--saffron);
  color: #fff;
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 1.1rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 0 6px var(--paper);
  transition: transform .4s cubic-bezier(.34,1.56,.64,1);
}

.timeline-item:hover .timeline-marker {
  transform: scale(1.12);
}

.timeline-content {
  padding-top: 8px;
}

.timeline-day {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--saffron);
  margin-bottom: 4px;
}

.timeline-desc {
  font-size: 0.92rem;
  color: var(--ink2);
  line-height: 1.6;
}
    </style>

        const nav = document.getElementById("nav");

    <!-- Google Translate -->
    <div id="google_translate_element" style="display:none;"></div>

    <script>
        const langToggle = document.getElementById("langToggle");
        const langMenu = document.getElementById("langMenu");

        langToggle.addEventListener("click", (e) => {
            e.stopPropagation();
            langMenu.classList.toggle("open");
        });

        document.addEventListener("click", (e) => {
            if (!langMenu.contains(e.target) && e.target !== langToggle) {
                langMenu.classList.remove("open");
            }
        });

        function changeLang(lang) {

            if (lang === 'mr') {
                document.cookie = "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
                location.reload();
                return;
            }

            const langPair = `/mr/${lang}`;
            document.cookie = `googtrans=${langPair}; path=/`;
            document.cookie = `googtrans=${langPair}; path=/; domain=.${location.hostname}`;
            location.reload();
        }

        function googleTranslateElementInit() {
            new google.translate.TranslateElement(
                {
                    pageLanguage: 'mr',
                    includedLanguages: 'mr,hi,en',
                    autoDisplay: false
                },
                'google_translate_element'
            );
        }

    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script>
    const detailsContainer = document.getElementById("details");

    const timelineObserver = new MutationObserver(() => {
        const timelineEl = document.querySelector(".timeline");
        const items = document.querySelectorAll(".timeline-item");
        if (!timelineEl || !items.length) return;

        const io = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add("in");
                    timelineEl.classList.add("in");
                }
            });
        }, { threshold: 0.25 });

        items.forEach(item => io.observe(item));
    });

    timelineObserver.observe(detailsContainer, { childList: true, subtree: true });
</script>
