<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Admin Login</title>

<link rel="stylesheet" href="css/admin.css">

</head>


<body class="login-page">


<div class="login-box">


<h1>
Admin Login
</h1>


<form id="loginForm">


<input
type="email"
id="email"
placeholder="Email"
required>


<input
type="password"
id="password"
placeholder="Password"
required>


<button>

Login

</button>


<p id="error"></p>


</form>


</div>




<script type="module" src="./js/auth.js"></script>
</body>
</html>
