<body>

    <nav id="nav">
        <a class="nav-brand" href="index.html">

                जय गणेश ट्रॅव्हल्स
                <small>PUNE · EST. 2014</small>
            </div>
        </a>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="packages.html">Packages</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="contact.html">Contact</a></li>
            <div class="lang-switch">
                <button class="lang-toggle" id="langToggle">🌐</button>
                <div class="lang-menu" id="langMenu">
                    <button onclick="changeLang('mr')">मराठी</button>
                    <button onclick="changeLang('hi')">हिंदी</button>
                    <button onclick="changeLang('en')">English</button>
                </div>
            </div>
        </ul>

        <a class="nav-book" href="booking.html">Booking</a>

        <div class="ham" id="ham">
            <span></span><span></span><span></span>
        </div>

    <section class="section">

        </h1>


        <div style="display:flex;gap:15px;flex-wrap:wrap;margin-bottom:40px">

            <input id="search" placeholder="Search package..." style="
padding:12px;
border:1px solid #ddd;
border-radius:5px;
width:260px;
">


            <select id="filter" style="
padding:12px;
border:1px solid #ddd;
border-radius:5px;

                <option value="">
                    All

                    AC

    <script type="module" src="./js/packages.js"></script>


    <script>

        const nav = document.getElementById("nav");
        const ham = document.getElementById("ham");

        ham.onclick = () => {
            nav.classList.toggle("open");
        };

    </script>
    <!-- Google Translate -->
    <div id="google_translate_element" style="display:none;"></div>

    <script>
        const langToggle = document.getElementById("langToggle");
        const langMenu = document.getElementById("langMenu");

        langToggle.addEventListener("click", (e) => {
            e.stopPropagation();
            langMenu.classList.toggle("open");
        });

        document.addEventListener("click", (e) => {
            if (!langMenu.contains(e.target) && e.target !== langToggle) {
                langMenu.classList.remove("open");
            }
        });

        function changeLang(lang) {

            if (lang === 'mr') {
                document.cookie = "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
                location.reload();
                return;
            }

            const langPair = `/mr/${lang}`;
            document.cookie = `googtrans=${langPair}; path=/`;
            document.cookie = `googtrans=${langPair}; path=/; domain=.${location.hostname}`;
            location.reload();
        }

        function googleTranslateElementInit() {
            new google.translate.TranslateElement(
                {
                    pageLanguage: 'mr',
                    includedLanguages: 'mr,hi,en',
                    autoDisplay: false
                },
                'google_translate_element'
            );
        }

    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>

</html>
